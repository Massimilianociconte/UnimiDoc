name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint, typecheck (app + worker), unit test, build, budget bundle.
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run typecheck:worker
      - run: npm test
      # Il prerender usa le credenziali pubbliche (anon) se presenti nei
      # secrets; senza, viene saltato con warning e la build resta valida.
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # Budget misurabile sul bundle: fallisce su aumenti anomali.
      - run: npm run check:bundle

  # Type-check Deno di tutte le Edge Functions + unit test dei moduli condivisi.
  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Resolve npm: deps (stripe, supabase-js). Shared modules + unit tests only:
      # full */index.ts still carries historical body typing debt.
      - name: Deno check shared modules
        working-directory: supabase/functions
        run: |
          for i in 1 2 3; do
            deno check --node-modules-dir=auto _shared/*.ts && exit 0
            echo "deno check attempt $i failed, retrying..."
            sleep 5
          done
          exit 1
      - name: Deno unit tests
        working-directory: supabase/functions
        run: deno test --allow-env --node-modules-dir=auto _shared/

  # Migrazioni applicate da zero (coerenza) + suite pgTAP: RLS, isolamento
  # tra utenti, invarianti wallet, acquisti idempotenti, accesso RAG.
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase db start
      - run: supabase test db

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Modalità demo (.env.e2e): nessun secret necessario.
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
