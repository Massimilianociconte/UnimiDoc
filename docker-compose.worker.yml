# Deployment containerizzato del worker PDF (VPS singolo o Docker host).
#
#   cp .env.worker.example .env.worker   # compila i secret
#   docker compose -f docker-compose.worker.yml up -d --build
#
# La coda vive in Postgres (lease + retry + dead-letter): più repliche possono
# girare in parallelo senza coordinazione, basta un PDF_WORKER_ID univoco per
# replica (qui derivato dall'hostname del container).

services:
  pdf-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env.worker
    restart: unless-stopped
    # Il worker chiude in modo pulito su SIGTERM: abortisce i job in corso e
    # lascia che il lease scada; il grace period copre l'ultimo heartbeat.
    stop_grace_period: 90s
    # /tmp effimero e separato dal filesystem dell'immagine.
    tmpfs:
      - /tmp:size=2g
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.PDF_WORKER_HEALTH_PORT || 8080) + '/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '5'
    deploy:
      resources:
        limits:
          memory: 2g
