[build]
  # COMMIT_REF è fornito da Netlify: diventa la release nel monitoraggio errori.
  command = "VITE_APP_VERSION=${COMMIT_REF:-dev} npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/functions/*"
  to = "https://pmpzfkikwfylesehfezv.supabase.co/functions/v1/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Gli header HTTP (sicurezza, CSP enforced + report-only, caching) vivono in
# public/_headers, unica fonte di verità: evitare duplicati qui.
