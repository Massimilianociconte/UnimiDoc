<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sei offline - UnimiDoc</title>
    <style>
      body { margin: 0; min-height: 100svh; display: grid; place-items: center; background: #fbfdfb; color: #233044; font-family: Inter, system-ui, -apple-system, sans-serif; }
      main { text-align: center; padding: 32px; max-width: 420px; }
      h1 { color: #0b3f2d; font-size: 24px; margin-bottom: 8px; }
      p { line-height: 1.5; color: #667085; }
      button { margin-top: 18px; padding: 11px 24px; border: 0; border-radius: 10px; background: #16a34a; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <h1>Sei offline</h1>
      <p>UnimiDoc ha bisogno della connessione per caricare documenti e sincronizzare i progressi. Riprova appena torni online.</p>
      <button onclick="window.location.reload()">Riprova</button>
    </main>
  </body>
</html>
